name: 日股监控

# 定时触发由外部服务器crontab每5分钟API dispatch(GitHub对新账号的schedule静默限制导致cron从不执行,
# 2026-07-06确认;且API触发无排队延迟、更准点)。
# 勿再加schedule段——若服务器cron与schedule并存,双重触发会重复运行。
on:
  workflow_dispatch: {}   # 由服务器cron远程触发 + 手动测试

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体(图表用)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装依赖
        run: pip install -q -r requirements.txt

      - name: 跑一轮检查
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python market.py --once

      - name: 提交历史数据/图表/状态
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state.json '*.csv' '*.png' || true
          if git diff --cached --quiet; then
            echo "无数据变化，跳过提交"
            exit 0
          fi
          git commit -q -m "数据更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') JST"
          # 并发运行会争抢push：重试若干次。CSV靠.gitattributes的union策略自动合并；
          # state.json/png等非union文件若冲突则取远端(本轮我方更新丢弃,下一轮自动重生)
          for attempt in 1 2 3 4 5 6; do
            git fetch -q origin main
            if git rebase -q origin/main 2>/dev/null; then
              if git push -q 2>/dev/null; then
                echo "第 $attempt 次尝试推送成功"
                exit 0
              fi
            else
              # rebase冲突(CSV已被union自动合并,能到这里的只剩state.json/png)：--ours=远端(rebase语义下ours是被rebase到的origin/main)
              git checkout --ours -- . 2>/dev/null || true
              git add -A
              GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --abort 2>/dev/null || true
              if git push -q 2>/dev/null; then
                echo "第 $attempt 次尝试(解决冲突后)推送成功"
                exit 0
              fi
            fi
            sleep $(( (RANDOM % 6) + 2 ))
          done
          # 6次都没推上去：不让工作流报红(否则GitHub发失败邮件)，本轮数据丢弃，下一轮会补
          echo "::warning::数据提交重试6次仍失败，本轮数据未保存(下一轮自动补)"
          exit 0
