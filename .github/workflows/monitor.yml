name: 日股监控

# 定时触发由外部服务器crontab每5分钟API dispatch(GitHub对新账号的schedule静默限制导致cron从不执行,
# 2026-07-06确认;且API触发无排队延迟、更准点)。
# 勿再加schedule段——若服务器cron与schedule并存,双重触发会重复运行。
on:
  workflow_dispatch: {}   # 由服务器cron远程触发 + 手动测试

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体(图表用)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: 安装依赖
        run: pip install -q -r requirements.txt

      - name: 跑一轮检查
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python market.py --once

      - name: 提交历史数据/图表/状态
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state.json '*.csv' '*.png' || true
          if ! git diff --cached --quiet; then
            git commit -m "数据更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') JST"
            git pull --rebase origin main
            git push
          fi
